# Slow app launch fix -- set systemd vars
exec-once = systemctl --user import-environment $(env | cut -d'=' -f 1)
exec-once = dbus-update-activation-environment --systemd --all

# Restart swayosd-server after env is set up (fixes race condition where it starts before Wayland is ready)
exec-once = pkill -x swayosd-server && sleep 1 && uwsm-app -- swayosd-server
