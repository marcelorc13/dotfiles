# Unbind defaults that are re-bound in hypr/binds/
# Only covers keys present in tiling.conf and utilities.conf.

# ── tiling.conf ───────────────────────────────────────────────────────────────

# Close windows
unbind = SUPER, W
unbind = CTRL ALT, DELETE

# Control tiling
unbind = SUPER, J
unbind = SUPER, P
unbind = SUPER, T
unbind = SUPER, F
unbind = SUPER CTRL, F
unbind = SUPER ALT, F
unbind = SUPER, O
unbind = SUPER, L

# Move focus
unbind = SUPER, LEFT
unbind = SUPER, RIGHT
unbind = SUPER, UP
unbind = SUPER, DOWN

# Switch workspaces
unbind = SUPER, code:10
unbind = SUPER, code:11
unbind = SUPER, code:12
unbind = SUPER, code:13
unbind = SUPER, code:14
unbind = SUPER, code:15
unbind = SUPER, code:16
unbind = SUPER, code:17
unbind = SUPER, code:18
unbind = SUPER, code:19

# Move window to workspace
unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT, code:15
unbind = SUPER SHIFT, code:16
unbind = SUPER SHIFT, code:17
unbind = SUPER SHIFT, code:18
unbind = SUPER SHIFT, code:19

# Move window silently to workspace
unbind = SUPER SHIFT ALT, code:10
unbind = SUPER SHIFT ALT, code:11
unbind = SUPER SHIFT ALT, code:12
unbind = SUPER SHIFT ALT, code:13
unbind = SUPER SHIFT ALT, code:14
unbind = SUPER SHIFT ALT, code:15
unbind = SUPER SHIFT ALT, code:16
unbind = SUPER SHIFT ALT, code:17
unbind = SUPER SHIFT ALT, code:18
unbind = SUPER SHIFT ALT, code:19

# Scratchpad
unbind = SUPER, S
unbind = SUPER ALT, S

# TAB between workspaces
unbind = SUPER, TAB
unbind = SUPER SHIFT, TAB
unbind = SUPER CTRL, TAB

# Move workspaces to other monitors
unbind = SUPER SHIFT ALT, LEFT
unbind = SUPER SHIFT ALT, RIGHT
unbind = SUPER SHIFT ALT, UP
unbind = SUPER SHIFT ALT, DOWN

# Swap windows
unbind = SUPER SHIFT, LEFT
unbind = SUPER SHIFT, RIGHT
unbind = SUPER SHIFT, UP
unbind = SUPER SHIFT, DOWN

# Cycle through windows
unbind = ALT, TAB
unbind = ALT SHIFT, TAB

# Resize active window
unbind = SUPER, code:20
unbind = SUPER, code:21
unbind = SUPER SHIFT, code:20
unbind = SUPER SHIFT, code:21

# Scroll through workspaces
unbind = SUPER, mouse_down
unbind = SUPER, mouse_up

# Move/resize with mouse (bindm → unbindm)
unbindm = SUPER, mouse:272
unbindm = SUPER, mouse:273

# Toggle groups
unbind = SUPER, G
unbind = SUPER ALT, G

# Join groups
unbind = SUPER ALT, LEFT
unbind = SUPER ALT, RIGHT
unbind = SUPER ALT, UP
unbind = SUPER ALT, DOWN

# Navigate grouped windows
unbind = SUPER ALT, TAB
unbind = SUPER ALT SHIFT, TAB
unbind = SUPER CTRL, LEFT
unbind = SUPER CTRL, RIGHT

# Scroll through grouped windows
unbind = SUPER ALT, mouse_down
unbind = SUPER ALT, mouse_up

# Activate group window by number
unbind = SUPER ALT, code:10
unbind = SUPER ALT, code:11
unbind = SUPER ALT, code:12
unbind = SUPER ALT, code:13
unbind = SUPER ALT, code:14

# Monitor scaling
unbind = SUPER, Slash

# ── utilities.conf ────────────────────────────────────────────────────────────

# Menus
unbind = SUPER, SPACE
unbind = SUPER CTRL, E
unbind = SUPER CTRL, C
unbind = SUPER CTRL, O
unbind = SUPER ALT, SPACE
unbind = SUPER, ESCAPE
unbind = , XF86PowerOff
unbind = SUPER, K
unbind = , XF86Calculator

# Aesthetics
unbind = SUPER SHIFT, SPACE
unbind = SUPER CTRL, SPACE
unbind = SUPER SHIFT CTRL, SPACE
unbind = SUPER, BACKSPACE
unbind = SUPER SHIFT, BACKSPACE
unbind = SUPER CTRL, BACKSPACE

# Notifications
unbind = SUPER, COMMA
unbind = SUPER SHIFT, COMMA
unbind = SUPER CTRL, COMMA
unbind = SUPER ALT, COMMA
unbind = SUPER SHIFT ALT, COMMA

# Toggles
unbind = SUPER CTRL, I
unbind = SUPER CTRL, N

# Captures
unbind = , PRINT
unbind = ALT, PRINT
unbind = SUPER, PRINT

# File sharing
unbind = SUPER CTRL, S

# Waybar-less information
unbind = SUPER CTRL ALT, T
unbind = SUPER CTRL ALT, B

# Control panels
unbind = SUPER CTRL, A
unbind = SUPER CTRL, B
unbind = SUPER CTRL, W
unbind = SUPER CTRL, T

# Dictation
unbind = SUPER CTRL, X

# Zoom
unbind = SUPER CTRL, Z
unbind = SUPER CTRL ALT, Z

# Lock system
unbind = SUPER CTRL, L
